<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            body {width: 100%;}
            button {width: 30%; font-size: 30px; padding: 15px; margin: 15px;}
        </style>
    </head>
<div id="app">
<body>
    <h1>Who ate the cookie?</h1>
    <div class="person">
        <div v-for="(person,index) in persons" :key="person.id">
            <button @click="toSpeak(person)">{{person.name}}</button>
            <audio :src="`http://api.voicerss.org/?key=ec2a598df23845f7bba6ad55eb8d2328&hl=en-us&v=${person.voice}&src=${person.speak}`" :ref="person.speaker">
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@next"></script>
<script src='voicerss-tts.min.js'></script>

<script>
    const { createApp } = Vue;
    const App = {
        data() {
            return {

            persons: [{
                id: '0',
                name: 'David',
                voice: 'John',
                speak: ["I think it's Sam."],
                click: 0,
                speaker: 'zero'
            },
            {
                id: '1',
                name: 'Lisa',
                voice: 'Linda',
                speak: ["Ask David."],
                click: 0,
                speaker: 'one'
            },
            {
                id: '2',
                name: 'Sam',
                voice: 'Mike',
                speak: ["It must be Julia."],
                click: 0,
                speaker: 'two'
            },
            {
                id: '3',
                name: 'Julia',
                voice: 'Amy',
                speak: ["Lisa knows."],
                click: 0,
                speaker: 'three'
            }],
            lastClick: 0,
            lastSpeak: ["I didn't eat it.", "I don't know.", "Who knows?", "I don't really care.", "Someone in the kitchen.", "I was in the living room.", "There was nothing on the table.", "I only got milk.", "I don't like cookies.", "It's not me.", "Forget it.", "I was not hungry.", "Ok, it's me. Here's a cookie for you."],
            }
        },
        methods: {
            toSpeak(person) {
                this.$refs[person.speaker].pause();
                if (person.click === 0) {
                    person.speak = person.speak[0];
                    //console.log(person.speak);
                    person.click++; 
                } else {
                    if (this.lastClick < this.lastSpeak.length) {
                        person.speak = this.lastSpeak[this.lastClick];
                        //console.log(this.lastSpeak[this.lastClick])
                        this.lastClick++ 
                        //console.log(this.lastClick)
                    } else {
                        person.speak = "Game over.";
                        //console.log("no", person.speak)
                    }
                }
                setTimeout(() => {
                     this.$refs[person.speaker].play();
                }, 500);

            }
        }
    }

createApp(App).mount("#app");
</script>
</body>
</html>
