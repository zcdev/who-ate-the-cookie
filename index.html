<!DOCTYPE html>
<html lang="en">
<head>
    <title>Who ate the cookie?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <style>
        body {font-family: 'Rubik', sans-serif; margin: 2em;}
        h1 {font-size: 1.5em; margin-bottom: 0; line-height: 1; color: #875546;}
        h2 {font-size: 1em;}
        .button {font-size: 1.5em; padding: 15px; background-color: #eee; border-radius: 20px; text-align: center; vertical-align: middle;}
        .selected {border:  3px solid orange; animation: glow 1.0s infinite alternate;}
        @-webkit-keyframes glow { to { box-shadow: 7px 7px 7px orange; } }
        .speakers {
            max-width: 2000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 1rem;
        }
        .cookie {font-size: 1.5em;}
        .icon {font-size: 2em; display: inline; vertical-align: middle; line-height: 1;}
        .name {display: inline-block; margin-right: 10px;}
        @media screen and (min-width: 480px) {
            h1 {font-size: 3em;}
            h2 {font-size: 1.5em;}
            .speakers {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                grid-gap: 2rem;
            }
            .button {font-size: 2em; display: grid;  justify-content: center;
  align-items: center;}
            .name {margin-right: 0;}
        }
    </style>
</head>
<body id="app">
    <h1>Who ate the cookie? <span class="cookie">🍪</span></h1>
    <h2>Please turn on your speaker. You might not get a cookie (maximum API calls are limited). First come, first serve.</h2>
    <div class="speakers">
        <div class="person" v-for="(person,index) in persons" :key="person.id">
            <div  @click="toSpeak(person);toggleSelect(person)" :class="[button, (person.selected? 'selected': '')]"><span class="name">{{person.name[0]}}</span><span class="icon">{{person.name[1]}}</span></div>
            <audio :src="`https://api.voicerss.org/?key=ec2a598df23845f7bba6ad55eb8d2328&hl=en-us&v=${person.voice}&src=${person.speak}`" :ref="person.speaker">
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3.1.1/dist/vue.global.prod.js"></script>
<script src='voicerss-tts.min.js'></script>

<script>
    const { createApp } = Vue;
    const App = {
        data() {
            return {
            persons: [{
                id: '0',
                name: ['David', '👱🏻‍♂️'],
                voice: 'John',
                speak: ["I think it's Sam."],
                click: 0,
                speaker: 'zero',
                selected: false
            },
            {
                id: '1',
                name: ['Lisa', '👩🏽'],
                voice: 'Linda',
                speak: ["Ask David."],
                click: 0,
                speaker: 'one',
                selected: false
            },
            {
                id: '2',
                name: ['Sam', '🧑🏿‍🦱'],
                voice: 'Mike',
                speak: ["It must be Julia."],
                click: 0,
                speaker: 'two',
                selected: false
            },
            {
                id: '3',
                name: ['Julia', '👧🏻'],
                voice: 'Amy',
                speak: ["Lisa knows."],
                click: 0,
                speaker: 'three',
                selected: false
            }],
            button: 'button',
            lastClick: 0,
            lastSpeak: ["I didn't eat it.", "I don't know.", "Who knows?", "I don't really care.", "Someone in the kitchen.", "I was in the living room.", "There was nothing on the table.", "I only got milk.", "I don't like cookies.", "It's not me.", "Forget it.", "I was not hungry.", "Ok, it's me. Here's a cookie for you."],
            }
        },
        methods: {
            toSpeak(person) {
                let audio = this.$refs[person.speaker];
                audio.addEventListener('pause', () => { person.selected = false; });
                audio.addEventListener('play', () => { person.selected = true; });

                if (person.click === 0) {
                    person.speak = person.speak[0];
                    person.click++;   
                } else {
                    if (this.lastClick < this.lastSpeak.length) {
                        person.speak = this.lastSpeak[this.lastClick];
                        this.lastClick++ 
                    } else {
                        person.speak = "Game over.";
                    } 
                }

                setTimeout(() => {
                let playNow = audio.play();
                        playNow.then(() => {
                    }).catch(error => {
                        person.selected = false;
                        alert("There's no more cookie for today, come tomorrow!")
                    });
                
                }, 500);
            },
            toggleSelect(person) {
                person.selected || person.selected
                this.$refs[person.speaker].addEventListener("ended", () => { person.selected = false; });
            }
        }
    }

    createApp(App).mount("#app");
</script>
</body>
</html>
